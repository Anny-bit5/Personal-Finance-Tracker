{% extends "base.html" %}

{% block title %}Add Transaction - Finance Tracker{% endblock %}

{% block extra_css %}
<style>
    body{
       background: linear-gradient(120deg, #10907d 5%, #000d6f 60%,purple 15%, #138354 );
    }
    .imgcontainer{
         background-image:url("{{ url_for('static', filename='addtrans.png') }}");  background-size:1200px; background-position: left-top;
        background-attachment: fixed; padding:1px;}
    /* Modern Form Controls */
    .form-control, .form-select { 
        border-radius: 10px; 
        border: 1px solid #dee2e6; 
        padding: 0.7rem 1rem; 
        background-color: #f8f9fa;
    }
    .form-control:focus { 
        background-color: #fff;
        border-color: #0d6efd; 
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1); 
    }
    .card { border-radius: 20px; border: none; }

    /* Custom Radio Button Logic */
    .btn-check:checked + .btn-outline-success { background-color: #198754 !important; color: #fff !important; }
    .btn-check:checked + .btn-outline-danger { background-color: #dc3545 !important; color: #fff !important; }
    
</style>
{% endblock %}

{% block content %}
<div class="imgcontainer  mb-0 ">
    <div class="row g-2 justify-content-center align-items-center">
        
        <div class=" col-lg-5 mt-5 ">
            <div style="background: linear-gradient(125deg,rgb(180, 180, 246), #fbeafe 0%, #95aef9 100%);" class="card shadow-lg p-4">
                <form method="POST" action="{{ url_for('main.add_transaction') }}">
                    <div style="background-color: #4e54c8; color: white; padding: 12px; border-radius: 8px; font-size: 0.9rem;" class="mb-4 text-center shadow-sm">
                        Fill in the details to record your finance.
                    </div>

                    <div class="mb-2">
                        <label class="form-label fw-bold small text-uppercase text-secondary">Transaction Type</label>
                        <div class="d-flex gap-3">
                            <input type="radio" class="btn-check" name="type" id="income" value="income" autocomplete="off" required>
                            <label class="btn btn-outline-success w-100 py-2 fw-bold" for="income">
                                <i class="bi bi-plus-lg me-1"></i> Income
                            </label>

                            <input type="radio" class="btn-check" name="type" id="expense" value="expense" autocomplete="off">
                            <label class="btn btn-outline-danger w-100 py-2 fw-bold" for="expense">
                                <i class="bi bi-dash-lg me-1"></i> Expense
                            </label>
                        </div>
                    </div>

                    
                    <div class="row col-lg-12">
                        <div class="col-md-6 mb-2">
                        <label class="form-label fw-bold small text-secondary text-uppercase">Category</label>
                        <select class="form-select" name="category_id" required>
                            <option value="" disabled selected>Choose...</option>
                            {% for category in categories %}
                            <option value="{{ category.id }}">{{ category.name }}</option>
                            {% endfor %}
                        </select> </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-secondary text-uppercase">Amount</label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0">Rs</span>
                                <input type="number" step="0.01" class="form-control border-start-0" name="amount" placeholder="0.00" required>
                            </div>
                    </div>
                    </div>
                   <div class="row">
                     <div class="col-md-5">
                            <label class="form-label fw-bold small text-secondary text-uppercase">Date</label>
                            <input type="date" class="form-control" id="date" name="date" required>
                        </div>

                    <div class="col-md-6 mb-2">
                        <label class="form-label fw-bold small text-secondary text-uppercase">Description</label>
                        <textarea class="form-control" name="description" rows="1" placeholder="Optional notes..."></textarea>
                    </div>

                   </div>
                       
                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow">
                        <i class="bi bi-check2-circle me-1"></i> Save Record
                    </button>           
                </form>
            </div>
        </div>
        <div class=" col-lg-6 offset-lg-1 m-1">

            <div class="card  p-2">

                    <h5 class=" mb-2 d-flex align-items-center">

    </div>
</div>

<script>
    document.getElementById('date').valueAsDate = new Date();
</script>
{% endblock %}
